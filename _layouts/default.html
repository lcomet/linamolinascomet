<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ page.title }}{% if page.title %} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a class="brand" href="{{ '/' | relative_url }}"><span class="dot"></span> lina molinas comet</a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
      <li><a href="{{ '/blog/' | relative_url }}" {% if page.url contains 'blog' %}class="active"{% endif %}>Blog</a></li>
      <li><a href="{{ '/projects/' | relative_url }}" {% if page.url contains 'projects' %}class="active"{% endif %}>Projects</a></li>
      <li><a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a></li>
      <li><a href="https://www.linkedin.com/in/lina-teresa-molinas-comet" target="_blank" rel="noopener">Résumé</a></li>
    </ul>
  </nav>
</header>

<main>
  {{ content }}
</main>

<footer class="site-footer">
  <div class="wrap footer-row">
    <span>&copy; 2023&ndash;{{ 'now' | date: "%Y" }} Lina Molinas Comet</span>
    <a href="{{ '/feed.xml' | relative_url }}">RSS feed</a>
  </div>
</footer>

</body>
</html>
